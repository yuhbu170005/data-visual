<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KPI Dashboard</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 40px;
      background: #f8f9fa;
      color: #333;
    }
    .dashboard-title {
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      color: #2c3e50;
      margin-bottom: 40px;
      letter-spacing: -0.5px;
    }
    .kpi-container {
      display: flex;
      gap: 30px;
      justify-content: center;
      align-items: stretch;
      flex-wrap: wrap;
    }
    .kpi-card {
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      min-width: 260px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      border: 1px solid #f0f0f0;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .kpi-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.08);
    }
    .kpi-title {
      font-size: 14px;
      color: #888;
      font-weight: 600;
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .kpi-value {
      font-size: 42px;
      font-weight: 800;
      color: #1a1a1a;
      margin: 10px 0;
      background: linear-gradient(135deg, #2c3e50, #4ca1af);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .chart-container {
      position: relative;
      width: 140px;
      height: 140px;
    }
    .chart-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 26px;
      font-weight: 800;
      color: #2ca02c;
    }
  </style>
</head>
<body>

  <div class="dashboard-title">Airbnb NYC — Key Performance Indicators</div>
  <div class="kpi-container" id="kpi-container">
    <!-- Cards will be injected here via D3 -->
  </div>

  <script>
    d3.json("data/kpi.json").then(data => {
      
      const container = d3.select("#kpi-container");

      // 1. Total Listings Card
      const card1 = container.append("div").attr("class", "kpi-card");
      card1.append("div").attr("class", "kpi-title").text("Total Listings");
      card1.append("div").attr("class", "kpi-value").text(d3.format(",")(data.total_listings));

      // 2. Total Est Rev Card
      const card2 = container.append("div").attr("class", "kpi-card");
      card2.append("div").attr("class", "kpi-title").text("Total Est. Revenue");
      
      // Formatting to Millions
      const revInMillions = data.total_est_rev / 1e6;
      card2.append("div").attr("class", "kpi-value").text("$" + d3.format(",.1f")(revInMillions) + "M");

      // 3. Occupancy Rate Card (Donut Chart)
      const card3 = container.append("div").attr("class", "kpi-card");
      card3.append("div").attr("class", "kpi-title").text("Avg Occupancy Rate");
      
      const chartDiv = card3.append("div").attr("class", "chart-container");
      chartDiv.append("div").attr("class", "chart-text").text(d3.format(".1%")(data.occupancy_rate));

      const width = 140;
      const height = 140;
      const strokeWidth = 14;
      const radius = Math.min(width, height) / 2;

      const svg = chartDiv.append("svg")
        .attr("width", width)
        .attr("height", height)
        .append("g")
        .attr("transform", `translate(${width / 2},${height / 2})`);

      // Background Arc (Light Gray)
      const arcBg = d3.arc()
        .innerRadius(radius - strokeWidth)
        .outerRadius(radius)
        .startAngle(0)
        .endAngle(2 * Math.PI);

      svg.append("path")
        .attr("d", arcBg)
        .attr("fill", "#f0f2f5");

      // Foreground Arc (Animated Green)
      svg.append("path")
        .attr("fill", "#2ca02c")
        .transition()
        .duration(1200)
        .ease(d3.easeCubicOut)
        .attrTween("d", function() {
          const interpolate = d3.interpolate(0, data.occupancy_rate * 2 * Math.PI);
          return function(t) {
            const tempArc = d3.arc()
              .innerRadius(radius - strokeWidth)
              .outerRadius(radius)
              .startAngle(0)
              .endAngle(interpolate(t))
              .cornerRadius(strokeWidth / 2);
            return tempArc();
          };
        });

    }).catch(err => {
      console.error("Error loading KPI data:", err);
      d3.select("#kpi-container").append("p").text("Error loading KPI data.");
    });
  </script>
</body>
</html>
